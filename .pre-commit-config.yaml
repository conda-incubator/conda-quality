# Git hooks for the conda E2E suite, run via prek (or pre-commit).
# ruff reads its config from pyproject.toml; see `[tool.ruff]` there.
repos:
  # ruff runs from the pixi environment (one source of truth, always latest),
  # invoked via `pixi run` so it also resolves at git-commit time.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: pixi run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: pixi run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
